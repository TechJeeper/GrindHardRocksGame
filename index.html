<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grind Hard Rocks! - Mountain Cabin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Teko', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 1024px;
            aspect-ratio: 16/9;
            background: #000;
            box-shadow: 0 0 40px rgba(0,0,0,1);
            border: 4px solid #222;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #instructions {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 15px;
            border: 1px solid #444;
            border-radius: 5px;
            font-size: 16px;
            line-height: 1.2;
            pointer-events: none;
            color: #ddd;
            z-index: 10;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            #instructions { display: none; }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <canvas id="gameCanvas" width="1024" height="576"></canvas>
        <div id="instructions">
        <span style="color:#FFCC00; font-size: 20px;">OPERATIONS MANUAL:</span><br><br>
        1. Toggle TEMU CHISEL to mine mountain.<br>
        2. Tap EXCAVATOR to load the MTV.<br>
        3. Tap MTV to dispatch to Saw.<br>
        4. Set WIRE SAW SPEED (Low/High).<br>
        5. Pump WATER to cool Saw.<br>
        6. Tap BUILD to construct Cabin.
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- GAME STATE & VARIABLES ---
    let gameState = 'START';
    const GOAL_ROCKS = 1000;

    let brokenRocks = 0;
    let rawRocksAtSaw = 0;
    let cutRocks = 0;
    let cabinBlocks = 0;

    // Entities
    const chisel = { active: false, broken: false, timer: 0, rate: 45, x: 120, y: 350, angle: 0 };
    const excavator = { animTimer: 0, x: 230, y: 360 };
    const mtv = { state: 'IDLE_QUARRY', load: 0, maxLoad: 12, x: 280, y: 420, targetX: 520, quarryX: 280 };
    const saw = { speed: 0, heat: 0, water: 100, maxWater: 100, overheated: false, timer: 0, wireSpeed: 0, progress: 0, x: 630, y: 380 };
    const honeybadger = { active: false, x: -100, y: 440, speed: 10, wheelRot: 0 };

    let particles = [];
    let buttons = [];
    let popups = [];

    let mouse = { x: 0, y: 0 };

    // --- INPUT HANDLING ---
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        let clientX = e.clientX;
        let clientY = e.clientY;
        if(e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function handleInput(e) {
        if(e.type === 'touchstart' || e.type === 'touchmove') e.preventDefault();
        if(e.type === 'mousedown' || e.type === 'touchstart') {
            const pos = getMousePos(e);
            mouse.x = pos.x; mouse.y = pos.y;
            checkInteractions();
        }
    }

    canvas.addEventListener('mousedown', handleInput);
    canvas.addEventListener('touchstart', handleInput, {passive: false});

    function checkInteractions() {
        if (gameState === 'START') { gameState = 'PLAY'; return; }
        if (gameState === 'WIN') { resetGame(); return; }

        buttons.forEach(btn => {
            if (mouse.x >= btn.x && mouse.x <= btn.x + btn.w && mouse.y >= btn.y && mouse.y <= btn.y + btn.h) {
                btn.action();
            }
        });
    }

    function resetGame() {
        brokenRocks = 0; rawRocksAtSaw = 0; cutRocks = 0; cabinBlocks = 0;
        chisel.active = false; chisel.broken = false;
        mtv.state = 'IDLE_QUARRY'; mtv.load = 0; mtv.x = mtv.quarryX;
        saw.speed = 0; saw.heat = 0; saw.water = 100; saw.overheated = false;
        gameState = 'PLAY';
    }

    // --- GAME LOOP ---
    function update() {
        if (gameState !== 'PLAY') return;

        // 1. Chisel Logic
        if (chisel.active && !chisel.broken) {
            chisel.timer++;
            chisel.angle = Math.sin(chisel.timer * 0.8) * 0.1; // rapid vibration
            if (chisel.timer >= chisel.rate) {
                brokenRocks += 1; // Break 1 massive boulder
                chisel.timer = 0;
                spawnParticles(chisel.x - 20, chisel.y + 70, '#7b8a8b', 1, 'boulder');
                spawnParticles(chisel.x - 20, chisel.y + 70, '#5b6d6f', 3, 'rock');
                
                if (Math.random() < 0.05) { // Break chance
                    chisel.broken = true; chisel.active = false; chisel.angle = 0.5;
                    addPopup("NEEDS FIXING!", chisel.x, chisel.y - 20, "#FF4500");
                }
            }
        }

        // 2. Excavator Animation
        if (excavator.animTimer > 0) excavator.animTimer--;

        // 3. MTV Logic
        if (mtv.state === 'DRIVING_SAW') {
            mtv.x += 4;
            if (mtv.x >= mtv.targetX) mtv.state = 'UNLOADING';
        } else if (mtv.state === 'UNLOADING') {
            if (mtv.load > 0) {
                let drop = 1; // Drop massive boulders
                mtv.load -= drop; rawRocksAtSaw += drop;
                spawnParticles(mtv.x + 90, mtv.y - 20, '#5b6d6f', 1, 'boulder');
            } else { mtv.state = 'DRIVING_QUARRY'; }
        } else if (mtv.state === 'DRIVING_QUARRY') {
            mtv.x -= 4;
            if (mtv.x <= mtv.quarryX) { mtv.x = mtv.quarryX; mtv.state = 'IDLE_QUARRY'; }
        }

        // 4. Saw Logic
        if (saw.speed > 0 && !saw.overheated) {
            saw.wireSpeed += saw.speed === 1 ? 0.2 : 0.5;
            
            if (rawRocksAtSaw > 0) {
                saw.timer++;
                let processRate = saw.speed === 1 ? 360 : 180; // Much slower cut times
                saw.progress = saw.timer / processRate;

                if (saw.timer >= processRate) {
                    rawRocksAtSaw--; cutRocks += 5; saw.timer = 0; saw.progress = 0; // 1 boulder yields 5 slabs
                    spawnParticles(saw.x + 40, saw.y + 20, '#999', 5, 'rock');
                    spawnParticles(saw.x + 60, saw.y + 20, '#FFA500', 3, 'spark');
                } else if (saw.timer % 10 === 0) {
                    // Sparks during the horizontal wire cut
                    let assemblyX = 10 + (saw.progress * 60);
                    if (assemblyX >= 20 && assemblyX <= 60) {
                        spawnParticles(saw.x + assemblyX, saw.y + 20, '#FFA500', 1, 'spark');
                    }
                }
            } else {
                saw.progress = 0; // Return wire to start
            }

            saw.water -= saw.speed === 1 ? 0.08 : 0.2;
            if (saw.water < 0) saw.water = 0;

            if (saw.water <= 0) saw.heat += saw.speed === 1 ? 0.5 : 1.2;
            else saw.heat -= 0.3; 

            if (saw.heat < 0) saw.heat = 0;
            if (saw.heat >= 100) {
                saw.overheated = true; saw.speed = 0;
                addPopup("JAMMED!", saw.x + 40, saw.y - 40, "#f00");
            }
        } else if (saw.overheated) {
            saw.heat -= 0.15;
            if (saw.heat <= 0) saw.overheated = false;
        } else {
            // slowly return wire to top if stopped or empty
            if (rawRocksAtSaw === 0 && saw.progress > 0) saw.progress = Math.max(0, saw.progress - 0.02);
        }

        // Honeybadger Easter Egg
        if (!honeybadger.active && Math.random() < 0.0005) {
            honeybadger.active = true; honeybadger.x = -150;
        }
        if (honeybadger.active) {
            honeybadger.x += honeybadger.speed;
            honeybadger.wheelRot += 0.5;
            if (honeybadger.x > 1200) honeybadger.active = false;
        }

        if (cabinBlocks >= GOAL_ROCKS) {
            cabinBlocks = GOAL_ROCKS;
            gameState = 'WIN';
        }

        updateParticles(); updatePopups();
    }

    // --- HIGH DETAIL DRAWING ---
    function draw() {
        // Sky Gradient
        let sky = ctx.createLinearGradient(0, 0, 0, 400);
        sky.addColorStop(0, "#2c3e50");
        sky.addColorStop(0.5, "#4ca1af");
        sky.addColorStop(1, "#c4e0e5");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawDetailedMountains();

        // Terrain Base
        let ground = ctx.createLinearGradient(0, 400, 0, canvas.height);
        ground.addColorStop(0, "#3e4a3d");
        ground.addColorStop(1, "#1a2419");
        ctx.fillStyle = ground;
        ctx.fillRect(0, 400, canvas.width, canvas.height - 400);

        // Dirt Path
        ctx.fillStyle = "#4a3b2c";
        ctx.beginPath();
        ctx.moveTo(0, 430); ctx.lineTo(canvas.width, 430);
        ctx.lineTo(canvas.width, 480); ctx.lineTo(0, 470);
        ctx.fill();

        drawTrees();

        buttons = []; // Reset UI buttons

        if (gameState === 'START') drawStartScreen();
        else if (gameState === 'WIN') drawWinScreen();
        else {
            drawQuarry();
            drawEntities();
            drawUI();
            drawPopups();
            drawParticles();
        }
    }

    function drawDetailedMountains() {
        // Distant giant mountain peak
        ctx.fillStyle = "#2c3e50";
        ctx.beginPath();
        ctx.moveTo(300, 400);
        ctx.lineTo(650, 120); // Peak
        ctx.lineTo(1000, 400);
        ctx.fill();

        // Snow on distant peak
        ctx.fillStyle = "#ecf0f1";
        ctx.beginPath();
        ctx.moveTo(650, 120);
        ctx.lineTo(560, 240);
        ctx.lineTo(600, 230);
        ctx.lineTo(640, 260);
        ctx.lineTo(680, 220);
        ctx.lineTo(720, 250);
        ctx.fill();

        // Back mountains
        ctx.fillStyle = "#5d6d7e";
        drawPeakSequence(0, 300, 180, 0.4);
        
        // Front mountains with snow
        ctx.fillStyle = "#34495e";
        drawPeakSequence(0, 380, 250, 0.7);
    }

    function drawPeakSequence(startX, baseHeight, peakGap, scale) {
        let peaks = [];
        for(let i=0; i<12; i++) {
            let x = startX + i * peakGap;
            let peakY = baseHeight - (Math.abs(Math.sin(i * 123)) * 150 * scale);
            let valleyX = x + peakGap/2;
            let valleyY = baseHeight + 20 * scale;
            peaks.push({x: x, y: peakY, vx: valleyX, vy: valleyY});
        }

        // Draw mountain body completely first
        ctx.beginPath();
        ctx.moveTo(startX, 400);
        for(let i=0; i<peaks.length; i++) {
            ctx.lineTo(peaks[i].x, peaks[i].y);
            if(i < peaks.length - 1) ctx.lineTo(peaks[i].vx, peaks[i].vy);
        }
        ctx.lineTo(canvas.width, 400);
        ctx.fill();

        // Draw snow caps safely on top of mountain body
        ctx.fillStyle = "#ecf0f1";
        for(let i=0; i<peaks.length; i++) {
            if (peaks[i].y < 280) { // Check if peak is high enough for snow
                let px = peaks[i].x;
                let py = peaks[i].y;
                ctx.beginPath();
                ctx.moveTo(px, py);
                ctx.lineTo(px - 30*scale, py + 40*scale);
                ctx.lineTo(px - 10*scale, py + 50*scale);
                ctx.lineTo(px + 10*scale, py + 45*scale);
                ctx.lineTo(px + 30*scale, py + 40*scale);
                ctx.fill();
            }
        }
    }

    function drawTrees() {
        drawTree(380, 410, 1.2);
        drawTree(440, 420, 0.8);
        drawTree(520, 415, 1.0);
        drawTree(760, 410, 1.3);
        drawTree(960, 425, 0.9);
        drawTree(1000, 415, 1.1);
    }

    function drawTree(x, y, scale) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);

        // Trunk
        ctx.fillStyle = "#3e2723";
        ctx.fillRect(-4, 0, 8, 15);

        // Leaves (Pine style layered)
        ctx.fillStyle = "#27ae60";
        ctx.beginPath(); ctx.moveTo(0, -35); ctx.lineTo(15, 5); ctx.lineTo(-15, 5); ctx.fill();
        ctx.fillStyle = "#2ecc71"; // Highlight
        ctx.beginPath(); ctx.moveTo(0, -35); ctx.lineTo(0, 5); ctx.lineTo(-15, 5); ctx.fill();

        ctx.fillStyle = "#27ae60";
        ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(12, -10); ctx.lineTo(-12, -10); ctx.fill();
        ctx.fillStyle = "#2ecc71";
        ctx.beginPath(); ctx.moveTo(0, -50); ctx.lineTo(0, -10); ctx.lineTo(-12, -10); ctx.fill();

        ctx.restore();
    }

    function drawQuarry() {
        ctx.save();
        // Base Mountain Rock
        let rockGrad = ctx.createLinearGradient(0, 100, 200, 430);
        rockGrad.addColorStop(0, "#7f8c8d");
        rockGrad.addColorStop(1, "#2c3e50");
        ctx.fillStyle = rockGrad;
        
        ctx.beginPath();
        ctx.moveTo(0, 450); ctx.lineTo(0, 150); ctx.lineTo(60, 180);
        ctx.lineTo(100, 250); ctx.lineTo(160, 320); ctx.lineTo(200, 450);
        ctx.fill();

        // Cracks and details
        ctx.strokeStyle = "#1a252f";
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(40, 200); ctx.lineTo(70, 260); ctx.lineTo(140, 300); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(80, 260); ctx.lineTo(100, 350); ctx.stroke();
        
        // Pile of massive boulders
        if (brokenRocks > 0) {
            ctx.fillStyle = "#95a5a6";
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 2;
            let displayCount = Math.min(brokenRocks, 20);
            for(let i=0; i<displayCount; i++) {
                ctx.beginPath();
                // pseudo-random pile stacking
                let bx = 130 + (i % 6) * 16 + (Math.sin(i)*5);
                let by = 440 - Math.floor(i / 6) * 14;
                ctx.arc(bx, by, 12, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                // small detail line on boulder
                ctx.beginPath(); ctx.moveTo(bx-5, by-2); ctx.lineTo(bx+2, by+4); ctx.stroke();
            }
        }
        ctx.restore();
    }

    function drawEntities() {
        drawChisel();
        drawExcavator();
        drawMTV();
        drawSaw();
        drawHoneybadger();
        drawCabin();
    }

    function drawChisel() {
        ctx.save();
        ctx.translate(chisel.x, chisel.y);
        ctx.rotate(chisel.angle);
        
        // Base Unit
        ctx.fillStyle = "#d35400"; // Orange industrial
        ctx.beginPath(); ctx.moveTo(-10, -20); ctx.lineTo(30, -20); ctx.lineTo(40, 10); ctx.lineTo(-10, 10); ctx.fill();
        ctx.fillStyle = "#222"; ctx.fillRect(0, -15, 20, 10); // Vents

        // Arm Pivot
        ctx.beginPath(); ctx.arc(35, -5, 8, 0, Math.PI*2); ctx.fill();

        // Arm
        ctx.fillStyle = "#e67e22";
        ctx.translate(35, -5);
        ctx.rotate(0.5); // point down-left towards rock
        ctx.fillRect(0, -5, 60, 10);

        // Jackhammer Head
        ctx.translate(60, 0);
        ctx.fillStyle = "#7f8c8d";
        ctx.fillRect(-10, -10, 20, 20); // housing
        ctx.fillStyle = "#34495e";
        
        // Bit (moves if active)
        let bitExtension = (chisel.active && !chisel.broken && chisel.timer % 4 < 2) ? 15 : 0;
        ctx.fillRect(-3, 10, 6, 20 + bitExtension);
        
        if (chisel.broken) {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(-15, -15, 30, 30); // burnt look
        }

        ctx.restore();
    }

    function drawExcavator() {
        ctx.save();
        ctx.translate(excavator.x, excavator.y);
        
        // Tracks
        ctx.fillStyle = "#111";
        ctx.beginPath(); ctx.roundRect(-25, 45, 70, 20, 10) || ctx.rect(-25, 45, 70, 20); ctx.fill();
        ctx.fillStyle = "#333";
        for(let i=-20; i<40; i+=10) ctx.fillRect(i, 45, 5, 20); // tread lines

        // Undercarriage
        ctx.fillStyle = "#222";
        ctx.fillRect(-10, 35, 40, 10);

        // Cab / Body
        ctx.fillStyle = "#f1c40f"; // Yellow
        ctx.beginPath(); ctx.moveTo(-20, 35); ctx.lineTo(30, 35); ctx.lineTo(40, 5); ctx.lineTo(-10, 5); ctx.fill();
        ctx.fillStyle = "#2c3e50"; // Window
        ctx.beginPath(); ctx.moveTo(0, 30); ctx.lineTo(25, 30); ctx.lineTo(30, 10); ctx.lineTo(5, 10); ctx.fill();

        // Boom Arm Joint
        ctx.fillStyle = "#222";
        ctx.beginPath(); ctx.arc(20, 20, 10, 0, Math.PI*2); ctx.fill();

        // Boom (Animated)
        let armRot = excavator.animTimer > 0 ? -0.4 : 0;
        ctx.translate(20, 20);
        ctx.rotate(armRot);
        
        ctx.lineWidth = 12;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#f39c12"; // Darker yellow
        
        // Draw angled boom
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(40, -30); // Boom up
        ctx.lineTo(70, 10);  // Stick down
        ctx.stroke();

        // Joints
        ctx.fillStyle = "#333";
        ctx.beginPath(); ctx.arc(40, -30, 6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(70, 10, 6, 0, Math.PI*2); ctx.fill();

        // Bucket
        ctx.translate(70, 10);
        let bucketRot = excavator.animTimer > 0 ? 0.5 : 0;
        ctx.rotate(bucketRot);
        ctx.fillStyle = "#7f8c8d";
        ctx.beginPath();
        ctx.moveTo(-10, -5); ctx.lineTo(15, -5); ctx.lineTo(20, 20); 
        ctx.lineTo(-5, 25); ctx.closePath();
        ctx.fill();
        // Teeth
        ctx.fillStyle = "#bdc3c7";
        ctx.fillRect(15, 15, 8, 4); ctx.fillRect(13, 20, 8, 4);

        ctx.restore();
    }

    function drawMTV() {
        ctx.save();
        ctx.translate(mtv.x, mtv.y);
        
        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.ellipse(40, 20, 60, 10, 0, 0, Math.PI*2); ctx.fill();

        // Chassis
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(0, -5, 100, 8);

        // Cab (Military Style)
        ctx.fillStyle = "#4a5320"; // Olive Drab
        ctx.beginPath(); 
        ctx.moveTo(0, -5); ctx.lineTo(0, -35); ctx.lineTo(25, -35); 
        ctx.lineTo(35, -5); ctx.fill();
        // Window
        ctx.fillStyle = "#87CEEB";
        ctx.beginPath(); ctx.moveTo(5, -10); ctx.lineTo(5, -30); ctx.lineTo(22, -30); ctx.lineTo(28, -10); ctx.fill();

        // Exhaust
        ctx.fillStyle = "#7f8c8d"; ctx.fillRect(25, -45, 5, 15);
        if (mtv.state !== 'IDLE_QUARRY' && mtv.state !== 'UNLOADING') {
            spawnParticles(mtv.x + 27, mtv.y - 45, '#333', 1, 'smoke');
        }

        // Dump Bed (Animated)
        let bedAngle = mtv.state === 'UNLOADING' ? -0.4 : 0;
        ctx.translate(35, -5);
        ctx.rotate(bedAngle);
        
        ctx.fillStyle = "#3e4722"; // Darker olive
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(65, 0); ctx.lineTo(70, -30); ctx.lineTo(-10, -30); ctx.fill();
        // Side ridges
        ctx.fillStyle = "#2a3015";
        ctx.fillRect(10, -25, 5, 20); ctx.fillRect(30, -25, 5, 20); ctx.fillRect(50, -25, 5, 20);

        // Massive Boulders in bed
        if (mtv.load > 0) {
            ctx.fillStyle = "#7f8c8d";
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 2;
            for(let i=0; i<mtv.load; i++) {
                ctx.beginPath();
                let bx = 15 + (i % 4) * 14;
                let by = -28 - Math.floor(i / 4) * 12;
                ctx.arc(bx, by, 9, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
            }
        }

        ctx.rotate(-bedAngle);
        ctx.translate(-35, 5);

        // Wheels (6x6)
        drawWheel(10, 5, mtv.x); drawWheel(60, 5, mtv.x); drawWheel(85, 5, mtv.x);

        ctx.restore();
    }

    function drawWheel(x, y, rotationBase) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rotationBase * 0.1);
        ctx.fillStyle = "#111";
        ctx.beginPath(); ctx.arc(0, 0, 14, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#333"; // Rim
        ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
        // Treads
        ctx.fillStyle = "#555";
        for(let i=0; i<6; i++) {
            ctx.fillRect(8, -2, 4, 4);
            ctx.rotate(Math.PI/3);
        }
        ctx.restore();
    }

    function drawSaw() {
        ctx.save();
        ctx.translate(saw.x, saw.y);
        
        // Base / Frame
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(-20, 45, 120, 10); // Base platform
        
        // Side tracks for the horizontal wire saw carriage
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(-5, -60, 10, 110); // Left post
        ctx.fillRect(85, -60, 10, 110); // Right post
        
        ctx.fillStyle = "#34495e";
        ctx.fillRect(0, -50, 90, 10); // Top track
        ctx.fillRect(0, 35, 90, 10); // Bottom track

        // Massive boulders waiting
        if (rawRocksAtSaw > 1) {
            ctx.fillStyle = "#95a5a6";
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 2;
            let displayWait = Math.min(rawRocksAtSaw - 1, 5);
            for(let i=0; i<displayWait; i++) {
                ctx.beginPath();
                let bx = -25 - (i*35);
                let by = 28;
                ctx.arc(bx, by, 16, 0, Math.PI*2);
                ctx.fill(); ctx.stroke();
            }
        }

        // Boulder currently being cut
        if (rawRocksAtSaw > 0) {
            ctx.fillStyle = "#95a5a6";
            ctx.strokeStyle = "#2c3e50";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(40, 20, 20, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
        }

        // The moving cutting wire assembly (moves horizontally)
        // progress goes 0 to 1.
        let assemblyX = 10 + (saw.progress * 60);

        // Assembly carriage
        ctx.fillStyle = "#e74c3c"; // Red accent
        ctx.fillRect(assemblyX - 10, -55, 20, 20); // Top slider
        ctx.fillRect(assemblyX - 10, 30, 20, 20); // Bottom slider
        ctx.fillStyle = "#222";
        ctx.fillRect(assemblyX - 3, -35, 6, 65); // motor bar

        // Pulleys
        drawPulley(assemblyX, -40, saw.wireSpeed);
        drawPulley(assemblyX, 40, saw.wireSpeed);

        // The Wire! (Vertical now, moving horizontally)
        ctx.strokeStyle = saw.heat > 60 ? "#e74c3c" : "#ecf0f1";
        ctx.lineWidth = 2;
        if (saw.heat > 80) {
            ctx.shadowColor = "#e74c3c";
            ctx.shadowBlur = (saw.heat - 50) / 2;
        }
        ctx.beginPath();
        // Wire connects the pulleys
        ctx.moveTo(assemblyX, -32);
        ctx.lineTo(assemblyX, 32);
        ctx.stroke();
        ctx.shadowBlur = 0; // reset
        
        // Draw horizontal cut line in the boulder (if cutting)
        if (rawRocksAtSaw > 0 && saw.progress > 0) {
            ctx.strokeStyle = "#111";
            ctx.lineWidth = 2;
            ctx.beginPath();
            let startCutX = 20; // Left edge of boulder
            let currentCutX = Math.min(Math.max(assemblyX, 20), 60);
            if (assemblyX > 20) {
                ctx.moveTo(startCutX, 20); // Center left
                ctx.lineTo(currentCutX, 20); // Center right following wire
                ctx.stroke();
            }
        }

        // Water Cooling System
        ctx.fillStyle = "#34495e";
        ctx.fillRect(100, -20, 30, 70); // Tank moved right
        ctx.fillStyle = "rgba(135, 206, 235, 0.2)";
        ctx.fillRect(102, -18, 26, 66);
        ctx.fillStyle = "#3498db";
        let waterH = (saw.water / saw.maxWater) * 64;
        ctx.fillRect(102, 48 - waterH, 26, waterH);
        
        // Hose to wire assembly
        ctx.strokeStyle = "#111"; ctx.lineWidth = 4;
        ctx.beginPath(); 
        ctx.moveTo(100, 40); 
        ctx.quadraticCurveTo(80, -40, assemblyX, -40); 
        ctx.stroke();

        ctx.restore();
    }

    function drawPulley(x, y, rot) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.fillStyle = "#7f8c8d";
        ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#222";
        ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
        // Spokes
        ctx.strokeStyle = "#222"; ctx.lineWidth = 2;
        for(let i=0; i<3; i++) {
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, -8); ctx.stroke();
            ctx.rotate(Math.PI * 2 / 3);
        }
        ctx.restore();
    }

    function drawHoneybadger() {
        if (!honeybadger.active) return;
        ctx.save();
        ctx.translate(honeybadger.x, honeybadger.y);
        
        // Frame
        ctx.fillStyle = "#111";
        ctx.beginPath(); ctx.moveTo(-20, -10); ctx.lineTo(40, -10); ctx.lineTo(30, 10); ctx.lineTo(-20, 10); ctx.fill();
        
        // Roll cage
        ctx.strokeStyle = "#2ecc71"; // Bright Green
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-10, -10); ctx.lineTo(0, -30); ctx.lineTo(20, -30); ctx.lineTo(30, -10); ctx.stroke();
        
        // Wheels
        drawWheel(-10, 10, honeybadger.wheelRot);
        drawWheel(30, 10, honeybadger.wheelRot);
        
        ctx.restore();
    }

    function drawCabin() {
        let cx = 820;
        let cy = 440;
        
        // Foundation
        ctx.fillStyle = "#7f8c8d";
        ctx.fillRect(cx - 10, cy, 180, 15);
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(cx - 10, cy+15, 180, 5);

        // Calculate visual blocks (1 visual = ~10 actual)
        let visualBlocks = Math.floor((cabinBlocks / GOAL_ROCKS) * 100);
        
        let bx = cx;
        let by = cy - 20;
        let row = 0;

        for(let i=0; i<visualBlocks; i++) {
            // Draw a detailed brick
            ctx.fillStyle = "#95a5a6"; // Gray rock
            ctx.fillRect(bx, by, 28, 18);
            
            // Texture/Highlight
            ctx.fillStyle = "#bdc3c7"; ctx.fillRect(bx, by, 28, 3);
            ctx.fillStyle = "#7f8c8d"; ctx.fillRect(bx, by+15, 28, 3);
            
            // Mortar line
            ctx.strokeStyle = "#34495e"; ctx.lineWidth = 1; ctx.strokeRect(bx, by, 28, 18);

            bx += 30;
            if (bx > cx + 130) {
                row++;
                bx = cx + (row % 2 === 0 ? 0 : 15); // Stagger rows
                by -= 20;
            }
        }
    }

    function drawUI() {
        // Top HUD Panel
        ctx.fillStyle = "rgba(10, 10, 10, 0.85)";
        ctx.beginPath(); ctx.roundRect(10, 10, canvas.width - 20, 60, 10) || ctx.rect(10, 10, canvas.width - 20, 60); ctx.fill();
        ctx.strokeStyle = "#f39c12"; ctx.lineWidth = 2; ctx.stroke();

        ctx.fillStyle = "#fff";
        ctx.font = "22px 'Teko', sans-serif";
        ctx.textAlign = "center";
        
        ctx.fillText(`BOULDERS MINED: ${brokenRocks}`, 150, 48);
        ctx.fillText(`AT SAW: ${rawRocksAtSaw}`, 380, 48);
        ctx.fillText(`SLABS: ${cutRocks}`, 620, 48);
        
        ctx.fillStyle = "#2ecc71";
        ctx.font = "26px 'Teko', sans-serif";
        ctx.fillText(`CABIN: ${cabinBlocks} / ${GOAL_ROCKS}`, 860, 48);

        // Control Panel (Bottom)
        let panelY = 480;
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, panelY, canvas.width, 96);
        ctx.fillStyle = "#2a2a2a";
        ctx.fillRect(0, panelY, canvas.width, 5); // top bevel

        // Quarry Controls
        drawGlassButton(20, panelY+15, 140, 60, chisel.broken ? "#c0392b" : (chisel.active ? "#7f8c8d" : "#d35400"), 
            chisel.broken ? "FIX TEMU CHISEL" : (chisel.active ? "TEMU CHISEL ON" : "TEMU CHISEL OFF"), () => {
            if (chisel.broken) { chisel.broken = false; chisel.active = true; addPopup("FIXED!", chisel.x, chisel.y, "#2ecc71"); }
            else chisel.active = !chisel.active;
        });

        drawGlassButton(175, panelY+15, 140, 60, "#f39c12", "LOAD EXCAVATOR", () => {
            if (mtv.state === 'IDLE_QUARRY' && brokenRocks > 0 && mtv.load < mtv.maxLoad) {
                let amount = Math.min(brokenRocks, 4, mtv.maxLoad - mtv.load); // Loads up to 4 massive boulders per scoop
                brokenRocks -= amount; mtv.load += amount; excavator.animTimer = 20;
                addPopup(`+${amount} BOULDERS`, mtv.x + 50, mtv.y - 40, "#fff");
            }
        });

        drawGlassButton(330, panelY+15, 140, 60, mtv.state === 'IDLE_QUARRY' ? "#4a5320" : "#555", 
            mtv.state === 'IDLE_QUARRY' ? "DISPATCH MTV" : "IN TRANSIT", () => {
            if (mtv.state === 'IDLE_QUARRY' && mtv.load > 0) mtv.state = 'DRIVING_SAW';
        });

        // Saw Controls
        ctx.fillStyle = "#fff"; ctx.font = "18px 'Teko'"; ctx.textAlign="left";
        ctx.fillText("SAW SPEED:", 485, panelY + 30);
        drawGlassButton(485, panelY+40, 50, 35, saw.speed === 0 ? "#2ecc71" : "#555", "OFF", () => { if(!saw.overheated) saw.speed = 0; });
        drawGlassButton(545, panelY+40, 50, 35, saw.speed === 1 ? "#2ecc71" : "#555", "LOW", () => { if(!saw.overheated) saw.speed = 1; });
        drawGlassButton(605, panelY+40, 50, 35, saw.speed === 2 ? "#2ecc71" : "#555", "MAX", () => { if(!saw.overheated) saw.speed = 2; });

        // Heat Gauge
        ctx.fillText("TEMP", 670, panelY + 30);
        ctx.fillStyle = "#111"; ctx.fillRect(670, panelY+40, 80, 15);
        let heatColor = saw.heat > 80 ? "#e74c3c" : (saw.heat > 50 ? "#f1c40f" : "#2ecc71");
        ctx.fillStyle = heatColor; ctx.fillRect(670, panelY+40, (saw.heat/100)*80, 15);

        drawGlassButton(765, panelY+15, 110, 60, "#3498db", "PUMP WATER", () => {
            saw.water = Math.min(saw.maxWater, saw.water + 25);
            saw.heat = Math.max(0, saw.heat - 15);
            spawnParticles(saw.x + 115, saw.y - 20, "#3498db", 8, 'water');
        });

        // Build
        drawGlassButton(890, panelY+15, 115, 60, "#95a5a6", "BUILD CABIN", () => {
            if (cutRocks > 0) {
                let buildAmt = cutRocks; cabinBlocks += buildAmt; cutRocks = 0;
                addPopup(`+${buildAmt} PLACED`, 900, 400, "#fff");
                spawnParticles(900, 420, "#bdc3c7", 10, 'rock');
            }
        });
    }

    function drawGlassButton(x, y, w, h, color, text, action) {
        ctx.save();
        // Base color
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.roundRect(x, y, w, h, 6) || ctx.rect(x, y, w, h); ctx.fill();
        
        // Glass highlight top
        let grad = ctx.createLinearGradient(x, y, x, y + h/2);
        grad.addColorStop(0, "rgba(255,255,255,0.3)"); grad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.roundRect(x, y, w, h/2, {tl:6, tr:6, bl:0, br:0}) || ctx.rect(x, y, w, h/2); ctx.fill();
        
        // Shadow bottom
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.beginPath(); ctx.roundRect(x, y+h-5, w, 5, {tl:0, tr:0, bl:6, br:6}) || ctx.rect(x, y+h-5, w, 5); ctx.fill();

        ctx.strokeStyle = "#111"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(x, y, w, h, 6) || ctx.rect(x, y, w, h); ctx.stroke();

        ctx.fillStyle = "#fff"; ctx.font = "20px 'Teko'";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        // Simple word wrap for small buttons
        if (text.includes(" ") && w <= 115) {
            let parts = text.split(" ");
            ctx.fillText(parts[0], x + w/2, y + h/2 - 10);
            ctx.fillText(parts[1], x + w/2, y + h/2 + 10);
        } else {
            ctx.fillText(text, x + w/2, y + h/2 + 2);
        }
        
        ctx.restore();
        buttons.push({x, y, w, h, action});
    }

    function drawStartScreen() {
        ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        
        ctx.fillStyle = "#f39c12"; ctx.font = "70px 'Teko'"; ctx.textAlign = "center";
        ctx.shadowColor = "#e67e22"; ctx.shadowBlur = 10;
        ctx.fillText("GRIND HARD ROCKS!", canvas.width/2, 220);
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#bdc3c7"; ctx.font = "30px 'Teko'";
        ctx.fillText("1000-Year Cabin Logistics Simulator", canvas.width/2, 270);

        if (Math.floor(Date.now() / 600) % 2 === 0) {
            ctx.fillStyle = "#2ecc71"; ctx.font = "35px 'Teko'";
            ctx.fillText("TAP OR CLICK TO START", canvas.width/2, 400);
        }
    }

    function drawWinScreen() {
        ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,canvas.width,canvas.height);

        ctx.fillStyle = "#2ecc71"; ctx.font = "70px 'Teko'"; ctx.textAlign = "center";
        ctx.fillText("CABIN COMPLETE!", canvas.width/2, 220);

        ctx.fillStyle = "#fff"; ctx.font = "26px 'Teko'";
        ctx.fillText("You successfully processed 1000 stones.", canvas.width/2, 280);
        ctx.fillText("The Grind Hard plumbing co legacy is secured.", canvas.width/2, 320);

        if (Math.floor(Date.now() / 600) % 2 === 0) {
            ctx.fillStyle = "#f1c40f"; ctx.font = "35px 'Teko'";
            ctx.fillText("TAP TO RESTART PIPELINE", canvas.width/2, 450);
        }
    }

    // --- EFFECTS & PARTICLES ---
    function spawnParticles(x, y, color, count, type) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 1) * 8,
                life: 1.0, color: color, type: type,
                size: Math.random() * 4 + 2
            });
        }
    }

    function updateParticles() {
        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy;
            p.vy += (p.type === 'smoke' ? -0.1 : 0.4); // Smoke goes up, rest falls
            if(p.type === 'smoke') p.vx *= 0.95;
            p.life -= (p.type === 'spark' ? 0.05 : 0.02);
            if(p.life <= 0) particles.splice(i, 1);
        }
    }

    function drawParticles() {
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            if (p.type === 'water') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            } else if (p.type === 'smoke') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 2, 0, Math.PI*2); ctx.fill();
            } else if (p.type === 'boulder') {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI*2); ctx.fill();
            } else {
                // jagged rocks/sparks
                ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.size, p.y+p.size/2); 
                ctx.lineTo(p.x+p.size/2, p.y+p.size); ctx.closePath(); ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        });
    }

    function addPopup(text, x, y, color) { popups.push({ text, x, y, color, life: 1.0 }); }

    function updatePopups() {
        for(let i = popups.length - 1; i >= 0; i--) {
            popups[i].y -= 0.8; popups[i].life -= 0.015;
            if(popups[i].life <= 0) popups.splice(i, 1);
        }
    }

    function drawPopups() {
        ctx.textAlign = "center"; ctx.font = "20px 'Teko'";
        popups.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.fillText(p.text, p.x, p.y);
            ctx.globalAlpha = 1.0;
        });
    }

    // Polyfill for roundRect on older browsers
    if (!CanvasRenderingContext2D.prototype.roundRect) {
        CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
            if (w < 2 * r) r = w / 2; if (h < 2 * r) r = h / 2;
            this.beginPath(); this.moveTo(x+r, y); this.arcTo(x+w, y, x+w, y+h, r);
            this.arcTo(x+w, y+h, x, y+h, r); this.arcTo(x, y+h, x, y, r);
            this.arcTo(x, y, x+w, y, r); this.closePath(); return this;
        }
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
    
    // Webfont loading delay to ensure font renders
    document.fonts.ready.then(function () { loop(); });

</script>
